<!DOCTYPE html>
<html>
<head>
  <title>Cricket Scoreboard</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #1d976c, #93f9b9);
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      width: 340px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 15px;
    }

    h3 {
      margin: 8px 0;
    }

    button {
      margin: 5px;
      padding: 10px 12px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background-color: #1d976c;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #145a41;
      transform: scale(1.05);
    }

    .danger {
      background-color: #e74c3c;
    }

    .danger:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>🏏 Cricket Scoreboard</h2>

  <h3 id="score">Runs: 0</h3>
  <h3 id="wickets">Wickets: 0</h3>
  <h3 id="overs">Overs: 0.0</h3>

  <button onclick="addRun(1)">+1</button>
  <button onclick="addRun(2)">+2</button>
  <button onclick="addRun(3)">+3</button>
  <button onclick="addRun(4)">+4</button>
  <button onclick="addRun(6)">+6</button>

  <br>

  <button onclick="addWicket()" class="danger">Wicket</button>
  <button onclick="addBall()">Ball</button>
  <button onclick="addWide()">Wide</button>
  <br><br>
  <button onclick="resetGame()" class="danger">Reset</button>
</div>

<script>
  let runs = 0;
  let wickets = 0;
  let balls = 0;

  function updateDisplay() {
    let overs = Math.floor(balls / 6);
    let ballInOver = balls % 6;

    document.getElementById("score").innerText = "Runs: " + runs;
    document.getElementById("wickets").innerText = "Wickets: " + wickets;
    document.getElementById("overs").innerText = "Overs: " + overs + "." + ballInOver;
  }

  function addRun(r) {
    runs += r;
    balls++;
    updateDisplay();
  }

  function addWicket() {
    if (wickets < 10) {
      wickets++;
      balls++;
      updateDisplay();
    } else {
      alert("All Out!");
    }
  }

  function addBall() {
    balls++;
    updateDisplay();
  }

  function addWide(){
    runs++;
    updateDisplay();
  }

  function resetGame() {
    runs = 0;
    wickets = 0;
    balls = 0;
    updateDisplay();
  }
</script>

</body>
</html>
